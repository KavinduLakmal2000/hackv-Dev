<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BREACH — real-time multiplayer hacking & defense terminal game" />

    <!-- ── Security meta tags ─────────────────────────────────────────────── -->
    <!-- X-Frame-Options equivalent — prevents clickjacking via iframe embed  -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- No MIME sniffing — browser must respect the declared content-type    -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Referrer policy — don't leak URL to external resources               -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      Content-Security-Policy is set as an HTTP header by the server (Helmet),
      which is the correct place — meta CSP cannot restrict all attack vectors.
      This is a belt-and-suspenders fallback only.
      Production: remove 'unsafe-inline' from style-src once Tailwind is removed.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        img-src     'self' data: https://res.cloudinary.com https://lh3.googleusercontent.com https://avatars.githubusercontent.com;
        connect-src 'self' ws://localhost:5000 wss://localhost:5000;
        frame-src   'none';
        object-src  'none';
      "
    />

    <!-- ── Preconnect for Google Fonts (used in terminal.css) ─────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Favicon placeholder ─────────────────────────────────────────────── -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><text y='24' font-size='24' fill='%2300ff41'>B</text></svg>" />

    <title>BREACH</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
